name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STRAPI_URL: ${{ secrets.STRAPI_URL }}
      STRAPI_TOKEN: ${{ secrets.STRAPI_TOKEN }}
      STRAPI_MEDIA_CDN_URL: ${{ secrets.STRAPI_MEDIA_CDN_URL }}
      NUXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.NUXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
      NUXT_PUBLIC_GITHUB_TOKEN: ${{ secrets.NUXT_PUBLIC_GITHUB_TOKEN }}
      UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
      UMAMI_SCRIPT_URL: ${{ secrets.UMAMI_SCRIPT_URL }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate static site
        run: yarn generate

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Sync to S3
        run: aws s3 sync --delete .output/public s3://${{ secrets.S3_BUCKET_NAME }}

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
